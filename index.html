<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SKM Experience</title>
    <meta name="theme-color" content="#D71920" />
    <meta name="description" content="SKM Egg Runner 2.0 — Protein Tracker & Game" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SKM" />
    <link rel="icon" type="image/png" href="/THUMBS_POSE__Egg_-removebg-preview.png?v=2" />
    <link rel="apple-touch-icon" href="/THUMBS_POSE__Egg_-removebg-preview.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // App shell / offline cache SW
          navigator.serviceWorker.register('/sw.js').catch(() => {});
          // FCM messaging SW — registered separately so it can be updated independently
          // The actual registration happens inside PushNotificationService when FCM token
          // is generated. This pre-registration ensures the SW is ready faster.
          navigator.serviceWorker.register('/firebase-messaging-sw.js', { scope: '/' }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
